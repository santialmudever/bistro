<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Tienes un Regalo!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0d0d;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .envelope {
            position: relative;
            width: 320px;
            height: 220px;
            background: #1a1a1a;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: transform 0.5s ease;
            border-radius: 0 0 10px 10px;
            z-index: 2;
        }
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #2a2a2a;
            transform-origin: top;
            transition: transform 0.5s ease 0.3s, z-index 0.2s ease 0.5s;
            z-index: 3;
        }
        .instruction {
            position: absolute;
            top: -60px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 1.1rem;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
            font-weight: bold;
        }
        .container.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
        }
        .ticket {
            position: absolute;
            width: 90%;
            max-width: 350px;
            opacity: 0;
            transform: scale(0.3) translateY(100px);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.6s, opacity 0.5s ease 0.6s;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 8px;
            border: 1px solid #333;
        }
        .container.open .ticket {
            opacity: 1;
            transform: scale(1) translateY(0);
            z-index: 10;
            position: relative;
        }
        
        .container.open .envelope {
            transform: translateY(150px) scale(0.8);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.6s ease, opacity 0.4s ease 0.2s;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="container" id="invitationContainer">
        <div class="envelope" onclick="openEnvelope()">
            <div class="instruction">SUEGROS, PULSAD PARA ABRIR VUESTRO REGALO DE BODAS! ✉️</div>
        </div>
        
        <img src="ticketregalo.png" alt="Bono Regalo Canalla Bistro" class="ticket" id="ticketImg">
    </div>

    <script>
        function openEnvelope() {
            const container = document.getElementById('invitationContainer');
            if(container.classList.contains('open')) return;
            container.classList.add('open');
            setTimeout(() => {
                var duration = 3 * 1000;
                var end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#ff0000', '#ffffff', '#ffbb00']
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#ff0000', '#ffffff', '#ffbb00']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            }, 600);
        }
    </script>
</body>
</html>
