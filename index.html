<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Tienes un Regalo!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0d0d;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1500px;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .envelope {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 220px;
            background: #1a1a1a;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            cursor: pointer;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease 0.2s;
            border-radius: 0 0 12px 12px;
            z-index: 2;
        }
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 125px solid #2a2a2a;
            transform-origin: top;
            transition: transform 0.4s ease 0.2s, z-index 0.1s ease 0.4s;
            z-index: 3;
        }
        .instruction {
            position: absolute;
            top: -65px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 1.1rem;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .container.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
        }
        .container.open .envelope {
            transform: translate(-50%, 30%) scale(0.4);
            opacity: 0;
            pointer-events: none;
        }
        .ticket {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 92%;
            max-width: 580px;
            height: auto;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.2);
            transition: transform 0.9s cubic-bezier(0.19, 1, 0.22, 1) 0.5s, opacity 0.6s ease 0.5s;
            z-index: 1;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
            border-radius: 12px;
        }
        .container.open .ticket {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            z-index: 10;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-12px); }
            60% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <div class="container" id="invitationContainer">
        <div class="envelope" onclick="openEnvelope()">
            <div class="instruction">SUEGROS, ABRIR VUESTRO REGALO DE BODAS! ❤️</div>
        </div>
        <img src="ticketregalo.png" alt="Bono Regalo Canalla Bistro" class="ticket" id="ticketImg">
    </div>

    <script>
        function openEnvelope() {
            const container = document.getElementById('invitationContainer');
            if(container.classList.contains('open')) return;
            container.classList.add('open');

            setTimeout(() => {
                var duration = 5 * 1000;
                var animationEnd = Date.now() + duration;
                var defaults = { startVelocity: 28, spread: 360, ticks: 60, zIndex: 100, scalar: 1.2 };

                function randomInRange(min, max) {
                    return Math.random() * (max - min) + min;
                }

                var interval = setInterval(function() {
                    var timeLeft = animationEnd - Date.now();

                    if (timeLeft <= 0) {
                        return clearInterval(interval);
                    }

                    var particleCount = 50 * (timeLeft / duration);

                    confetti(Object.assign({}, defaults, { 
                        particleCount, 
                        origin: { x: randomInRange(0.15, 0.45), y: randomInRange(0.2, 0.5) },
                        colors: ['#ff1a1a', '#ffffff', '#ffcc00', '#ff00aa']
                    }));

                    confetti(Object.assign({}, defaults, { 
                        particleCount, 
                        origin: { x: randomInRange(0.55, 0.85), y: randomInRange(0.2, 0.5) },
                        colors: ['#00ffcc', '#ffffff', '#ff6600', '#33ff33']
                    }));
                }, 350);
            }, 500);
        }
    </script>
</body>
</html>
